<script type="text/javascript">
(function(){
  // Dark mode toggle icon 초기화
  var toggle = document.querySelector('doxygen-awesome-dark-mode-toggle');
  if (toggle) {
    toggle.updateIcon();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
      toggle.updateIcon();
    });
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') { toggle.updateIcon(); }
    });
  }

  // 사이드바 항목 클릭 시 하위 카테고리 자동 확장
  document.addEventListener('DOMContentLoaded', function() {
    // Part 1: 이전 페이지에서 확장 요청이 저장된 경우, 이동 후 해당 항목을 확장
    var pendingHref = sessionStorage.getItem('navExpand');
    if (pendingHref) {
      sessionStorage.removeItem('navExpand');
      var done = false;

      function tryExpand() {
        if (done) return;
        var link = document.querySelector('#nav-tree-contents .label a[href="' + pendingHref + '"]');
        if (!link) return;
        var item = link.closest('div.item');
        if (!item) return;
        if (item.querySelector('span.arrowhead.closed')) {
          var arrow = item.querySelector('a[href="javascript:void(0)"]');
          if (arrow) { arrow.click(); done = true; }
        } else {
          done = true;
        }
      }

      var container = document.getElementById('nav-tree-contents');
      if (container) {
        tryExpand();
        if (!done) {
          var obs = new MutationObserver(function() { tryExpand(); if (done) obs.disconnect(); });
          obs.observe(container, { childList: true, subtree: true });
          setTimeout(function() { obs.disconnect(); }, 3000);
        }
      }
    }

    // Part 2: 하위 항목이 있는(closed) 항목 클릭 시 확장 요청을 sessionStorage에 저장
    var navTree = document.getElementById('nav-tree');
    if (!navTree) return;
    navTree.addEventListener('click', function(e) {
      var labelLink = e.target.closest('.label a');
      if (!labelLink) return;
      var item = labelLink.closest('div.item');
      if (!item) return;
      if (item.querySelector('span.arrowhead.closed')) {
        sessionStorage.setItem('navExpand', labelLink.getAttribute('href'));
      }
    });
  });

  // 언어 전환 버튼
  var a = document.getElementById('lang-switch');
  if (!a) return;
  var p = window.location.pathname;
  if (p.indexOf('/ko/') !== -1) {
    a.textContent = 'EN';
    a.href = p.replace('/ko/', '/');
  } else {
    a.textContent = 'KO';
    var i = p.lastIndexOf('/');
    a.href = p.substring(0, i) + '/ko' + p.substring(i);
  }
})();
</script>
