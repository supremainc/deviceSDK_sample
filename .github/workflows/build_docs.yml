name: Build Documentation

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install xpm and dependencies
        run: |
          npm install -g xpm@latest
          xpm install

      - name: Install Doxygen
        run: |
          DOXY_VER=1.17.0
          DOXY_TAG="Release_$(echo $DOXY_VER | tr '.' '_')"
          wget -q "https://github.com/doxygen/doxygen/releases/download/${DOXY_TAG}/doxygen-${DOXY_VER}.linux.bin.tar.gz" -O doxygen.tar.gz
          tar xf doxygen.tar.gz
          sudo install -m 755 "doxygen-${DOXY_VER}/bin/doxygen" /usr/local/bin/doxygen
          doxygen --version

      - name: Build docs
        run: node build_docs.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
